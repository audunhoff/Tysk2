<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch VG2 – 14 Dager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap');

:root {
  --bg: #0e0e22; --bg2: #161630; --gold: #e8b84b; --gold2: #f5d080;
  --blue: #5b8dd9; --green: #4dc490; --red: #e05555;
  --text: #ddd6c4; --text2: #a09888; --border: rgba(255,255,255,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px;
}

/* HEADER */
#header {
  background: rgba(0,0,0,0.6);
  border-bottom: 1px solid rgba(232,184,75,0.3);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 50;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.header-title { font-size: 9px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 3px; }
.header-h1 { font-family: 'Playfair Display', serif; font-size: clamp(16px,5vw,26px); color: #fff; }
.stats { display: flex; gap: 16px; flex-shrink: 0; }
.stat { text-align: center; }
.stat-n { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1; }
.stat-l { font-size: 8px; letter-spacing: 1px; color: var(--text2); text-transform: uppercase; }

/* DAG PICKER */
#picker {
  display: flex; gap: 6px; overflow-x: auto; padding: 10px 14px;
  background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
#picker::-webkit-scrollbar { display: none; }
.pbtn {
  flex-shrink: 0; padding: 6px 13px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
  color: #999; cursor: pointer; font-size: 12.5px; white-space: nowrap;
  font-family: 'Source Sans 3', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.pbtn.active { background: rgba(232,184,75,0.2); border-color: rgba(232,184,75,0.5); color: var(--gold); font-weight: 600; }
.pbtn.done { color: var(--green); border-color: rgba(77,196,144,0.3); }

/* MAIN */
#main { padding: 18px 16px 60px; max-width: 800px; margin: 0 auto; }

/* DAG HEADER */
.dag-nr { font-size: 10px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
.dag-h2 { font-family: 'Playfair Display', serif; font-size: clamp(18px,5vw,28px); color: #fff; margin-bottom: 3px; }
.dag-tema { font-style: italic; color: var(--text2); font-size: 14px; margin-bottom: 20px; }

/* TABS */
.tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.tbtn {
  padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
  background: rgba(255,255,255,0.07); color: #bbb;
  font-family: 'Source Sans 3', sans-serif; font-size: 13px;
  -webkit-tap-highlight-color: transparent;
}
.tbtn.active { background: var(--gold); color: #111; font-weight: 600; }

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* CARDS */
.card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; margin-bottom: 14px; }
.card-intro { line-height: 1.8; font-size: 14px; color: #c8c0b0; }
.regel-t { font-weight: 700; font-size: 14px; color: var(--gold); margin-bottom: 8px; }
.regel-b { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #b0c8e8; line-height: 1.9; white-space: pre-wrap; word-break: break-word; }
.huskeregel { background: rgba(232,184,75,0.09); border: 1px solid rgba(232,184,75,0.3); border-radius: 10px; padding: 13px 16px; margin-bottom: 12px; font-style: italic; color: #f0d090; font-size: 13.5px; line-height: 1.7; }
.lyttetips { background: rgba(77,196,144,0.07); border: 1px solid rgba(77,196,144,0.22); border-radius: 10px; padding: 11px 16px; font-size: 13px; color: #7ad8b0; line-height: 1.6; }

/* VOCAB */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 14px; }
.vocab-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.v-de { font-weight: 600; color: var(--gold); font-size: 14px; }
.v-no { font-style: italic; color: #88a0b8; font-size: 13px; text-align: right; }

/* OPPGAVER */
.prog-wrap { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.prog-bar { height: 100%; background: linear-gradient(90deg, var(--gold), var(--green)); border-radius: 2px; transition: width 0.4s; }
.done-msg { background: rgba(77,196,144,0.15); border: 1px solid rgba(77,196,144,0.4); border-radius: 8px; padding: 9px 14px; color: var(--green); font-size: 13px; margin-bottom: 14px; }
.opp-kort { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; margin-bottom: 16px; }
.opp-nr { font-size: 9px; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
.opp-q { font-size: 15px; color: #e0d8c8; line-height: 1.5; margin-bottom: 12px; }
.alt {
  display: block; width: 100%; text-align: left; padding: 11px 14px;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05); color: #bbb;
  font-family: 'Source Sans 3', sans-serif; font-size: 14px; cursor: pointer;
  margin-bottom: 8px; line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
}
.alt.riktig { background: rgba(60,190,100,0.2); border-color: rgba(60,190,100,0.5); color: #80e090; }
.alt.galt   { background: rgba(210,70,70,0.2);  border-color: rgba(210,70,70,0.4);  color: #f08080; }
.alt.valgt  { background: rgba(232,184,75,0.15); border-color: rgba(232,184,75,0.4); color: var(--gold); }
.fasit { background: rgba(232,184,75,0.07); border: 1px solid rgba(232,184,75,0.2); border-radius: 7px; padding: 10px 14px; margin-top: 10px; font-size: 13.5px; color: #d0c8a0; line-height: 1.6; }
.fasit-lbl { font-size: 9px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; font-weight: 700; margin-right: 5px; }

/* Desktop layout */
@media (min-width: 680px) {
  #page { display: flex; height: 100vh; overflow: hidden; flex-direction: column; }
  #header { flex-shrink: 0; }
  #body { display: flex; flex: 1; min-height: 0; }
  #picker {
    flex-direction: column; width: 175px; min-width: 175px; flex-shrink: 0;
    overflow-y: auto; overflow-x: hidden; border-right: 1px solid var(--border);
    border-bottom: none; padding: 12px 8px; gap: 3px; height: auto;
    display: flex;
  }
  .pbtn { border-radius: 7px; text-align: left; padding: 9px 10px; border-left: 3px solid transparent; }
  .pbtn.active { border-left-color: var(--gold); }
  #main { overflow-y: auto; padding: 22px 26px 40px; }
}
</style>
</head>
<body>
<div id="page">
  <div id="header">
    <div class="header-top">
      <div>
        <div class="header-title">Intensivt læringsopplegg · VG2</div>
        <div class="header-h1">🇩🇪 Deutsch — 14 Dager</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="sR" style="color:var(--green)">0</div><div class="stat-l">Riktige</div></div>
        <div class="stat"><div class="stat-n" id="sB" style="color:var(--gold)">0</div><div class="stat-l">Besvart</div></div>
        <div class="stat"><div class="stat-n" id="sD" style="color:var(--blue)">0</div><div class="stat-l">Dager✓</div></div>
      </div>
    </div>
  </div>
  <div id="body">
    <div id="picker"></div>
    <div id="main"></div>
  </div>
</div>
<script>
const curriculum = [
  {

    forklaring:"Alle tyske substantiver har et grammatisk kjønn: maskulinum (der), femininum (die) eller nøytrum (das). I flertall brukes alltid 'die'. Kjønnet må læres utenat for hvert ord, men det finnes nyttige mønstre.",
    regler:[

      ["🔴 Femininum (die)","Kvinnelige personer: die Frau, die Lehrerin\nOrd på -ung, -heit, -keit, -schaft, -ion: die Zeitung, die Freiheit, die Nation\nFleste blomster/trær: die Rose, die Eiche"],

    ordforrad:[["die Schule","skolen"],["der Lehrer","læreren (m)"],["die Lehrerin","læreren (f)"],["das Buch","boken"],["der Schüler","eleven (m)"],["die Schülerin","eleven (f)"],["das Heft","heftet"],["der Stift","pennen"],["die Tasche","vesken"],["das Zimmer","rommet"]],
    oppgaver:[
      ["Hva er riktig artikkel for 'Freiheit' (frihet)?",["der","die","das"],"die","Ord på -heit er alltid femininum → die Freiheit"],
      ["Hva er riktig artikkel for 'Mädchen' (jente)?",["der","die","das"],"das","Ord på -chen er alltid nøytrum, selv om de betegner kvinner → das Mädchen"],
      ["Hva er riktig artikkel for 'Montag'?",["der","die","das"],"der","Alle ukedager er maskulinum → der Montag"],
      ["Oversett: 'boken' på tysk",["das Buch","die Buch","der Buch"],"das Buch","Buch er nøytrum → das Buch"],

  },
  {
    dag:2, tittel:"Nominativ & Akkusativ", tema:"Hvem gjør hva? Subjekt og objekt",

    regler:[
      ["📗 Nominativ – subjektet","Der Mann liest. / Die Frau singt. / Das Kind schläft.\nSpørreord: Wer? (Hvem?)\nEtter er/ist: Das ist der Mann."],
      ["📘 Akkusativ – direkteobjektet","Ich sehe den Mann.  (der → den i akk.!)\nIch liebe die Frau. (die forblir die)\nIch kaufe das Buch. (das forblir das)\nSpørreord: Wen? Was?\n⚠️  KUN maskulinum endrer seg: der → den"],
      ["📋 Akkusativpreposisjoner","durch, für, gegen, ohne, um, bis, entlang\nEks: Ich kaufe ein Geschenk für den Vater."],
    ],
    huskeregel:"🧠 Bare maskulinum endres i akkusativ: DER → DEN. Femininum og nøytrum er uendret!",
    lyttetips:"🎧 <b>Nicos Weg A1 – Ganzer Film</b> &nbsp;|&nbsp; <a href='https://www.youtube.com/watch?v=4-eDoThe6qo' target='_blank' style='color:var(--green)'>▶ YouTube</a> – Identifiser subjekt (nominativ) og direkteobjekt (akkusativ) i dialogen.",
    ordforrad:[["kaufen","å kjøpe"],["sehen","å se"],["haben","å ha"],["brauchen","å trenge"],["finden","å finne"],["der Vater","faren"],["die Mutter","moren"],["der Bruder","broren"],["die Schwester","søsteren"],["das Kind","barnet"]],
    oppgaver:[
      ["Fyll inn: 'Ich sehe ___ Mann.'",["der","den","dem"],"den","Mann er i akkusativ (direkte obj.) og maskulinum → der → den"],

  {

    regler:[

      ["⭐ sein / haben / werden","SEIN:    ich bin  / du bist  / er ist  / wir sind / ihr seid / sie sind\nHABEN:   ich habe / du hast  / er hat  / wir haben/ ihr habt / sie haben\nWERDEN:  ich werde/ du wirst / er wird / wir werden/ihr werdet/sie werden"],

    ordforrad:[["verschwinden","å forsvinne"],["suchen","å lete"],["finden","å finne"],["tragen","å bære"],["aufpassen","å passe på"],["erleichtert","lettet"],["dankbar","takknemlig"],["unerwartet","uventet"],["das Abenteuer","eventyret"],["das Geheimnis","hemmeligheten"]],
    oppgaver:[
      ["Hvilken tid brukes oftest i tyske skriftlige fortellinger?",["Presens","Preteritum","Futurum"],"Preteritum","Preteritum er fortelletiden i skriftlig tysk."],
      ["V2: 'Plötzlich ___'",["Plötzlich kam er nach Hause.","Plötzlich er kam nach Hause.","Plötzlich nach Hause kam er."],"Plötzlich kam er nach Hause.","V2: Plötzlich på plass 1 → verb (kam) MÅ være plass 2"],
      ["'Sie fand einen ___ Hund.' (verletzt, mask. akk.)",["verletzte","verletzten","verletzter"],"verletzten","Etter 'einen' (mask. akk. ubestemt) → -en"],
      ["'Sie war froh, ___ sie ihn gefunden hatte.'",["dass","weil","obwohl"],"dass","'dass' = at. Hun var glad for AT hun hadde funnet ham."],
      ["'Han hadde lovet å passe bedre på.'",["Er hatte versprochen, besser aufzupassen.","Er hat versprochen besser aufpassen.","Er versprochen hatte besser aufzupassen."],"Er hatte versprochen, besser aufzupassen.","Pluskvamperfektum: hatte + versprochen. Inf. m/zu: aufzupassen"],
    ]
  }
];


// ── State
let dag = 0, fane = 'grammatikk';
const svar = {}, riktig = {};

// ── Helpers
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escA(s) { return String(s).replace(/'/g,"\\'"); }
function ferdig(di) { return curriculum[di].oppgaver.every((_,oi) => svar[di+'-'+oi] !== undefined); }

// ── Stats
function stats() {
  document.getElementById('sR').textContent = Object.keys(riktig).length;
  document.getElementById('sB').textContent = Object.keys(svar).length;
  document.getElementById('sD').textContent = curriculum.filter((_,i) => ferdig(i)).length;
}

// ── Picker
function picker() {
  const el = document.getElementById('picker');
  el.innerHTML = '';
  curriculum.forEach((d,i) => {
    const b = document.createElement('button');
    const ok = ferdig(i);
    b.className = 'pbtn' + (i===dag?' active':'') + (ok?' done':'');
    b.textContent = (ok?'✓ ':'') + 'Dag ' + d.dag;
    b.title = d.tittel;
    b.onclick = () => { dag=i; fane='grammatikk'; render(); };
    el.appendChild(b);
  });
  // scroll active into view on mobile
  const a = el.querySelector('.active');
  if (a) setTimeout(() => a.scrollIntoView({block:'nearest',inline:'center'}), 50);
}

// ── Main render
function render() {
  picker();
  stats();
  const d = curriculum[dag];
  const done = d.oppgaver.filter((_,oi) => svar[dag+'-'+oi]!==undefined).length;
  const pct = Math.round(done/d.oppgaver.length*100);

  let h = `<div class="dag-nr">Dag ${d.dag} · 30 minutter</div>
<h2 class="dag-h2">${d.tittel}</h2>
<div class="dag-tema">${d.tema}</div>
<div class="tabs">
  <button class="tbtn${fane==='grammatikk'?' active':''}" onclick="setFane('grammatikk')">📚 Grammatikk</button>
  <button class="tbtn${fane==='ordforrad'?' active':''}" onclick="setFane('ordforrad')">📝 Ordforråd</button>
  <button class="tbtn${fane==='oppgaver'?' active':''}" onclick="setFane('oppgaver')">✏️ Oppgaver (${done}/${d.oppgaver.length})</button>
</div>`;

  // GRAMMATIKK
  h += `<div class="panel${fane==='grammatikk'?' active':''}">`;
  h += `<div class="card"><p class="card-intro">${d.forklaring}</p></div>`;
  d.regler.forEach(([t,b]) => h += `<div class="card"><div class="regel-t">${t}</div><pre class="regel-b">${esc(b)}</pre></div>`);
  h += `<div class="huskeregel">${d.huskeregel}</div>`;
  h += `<div class="lyttetips">${d.lyttetips}</div>`;
  h += `</div>`;

  // ORDFORRÅD
  h += `<div class="panel${fane==='ordforrad'?' active':''}">`;
  h += `<div class="vocab-grid">`;
  d.ordforrad.forEach(([de,no]) => h += `<div class="vocab-card"><span class="v-de">${esc(de)}</span><span class="v-no">${esc(no)}</span></div>`);
  h += `</div><div class="card" style="color:#b0a898;font-size:13.5px;line-height:1.8"><b style="color:var(--gold)">💡 Tips:</b> Skriv hvert ord med artikkelen 5 ganger. Bruk Anki for spaced repetition.</div></div>`;

  // OPPGAVER
  h += `<div class="panel${fane==='oppgaver'?' active':''}">`;
  h += `<div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>`;
  if (done===d.oppgaver.length) h += `<div class="done-msg">✓ Alle oppgaver for Dag ${d.dag} fullført!</div>`;
  d.oppgaver.forEach(([q,alts,ans,fkl],oi) => {
    const key = dag+'-'+oi, v = svar[key], vist = v!==undefined;
    h += `<div class="opp-kort"><div class="opp-nr">Oppgave ${oi+1}</div><div class="opp-q">${esc(q)}</div>`;
    alts.forEach(a => {
      let cls = vist ? (a===ans?'riktig':a===v?'galt':'') : (a===v?'valgt':'');
      let pfx = vist&&a===ans?'✓ ':vist&&a===v&&a!==ans?'✗ ':'';
      h += `<button class="alt ${cls}" ${vist?'disabled':''} onclick="velg(${dag},${oi},'${escA(a)}')">${pfx}${esc(a)}</button>`;
    });
    if (vist) h += `<div class="fasit"><span class="fasit-lbl">Fasit:</span>${esc(fkl)}</div>`;
    h += `</div>`;
  });
  h += `</div>`;

  document.getElementById('main').innerHTML = h;
  document.getElementById('main').scrollTop = 0;
}

function setFane(f) { fane=f; render(); }
function velg(di,oi,a) {
  const k=di+'-'+oi;
  if (svar[k]!==undefined) return;
  svar[k]=a;
  if (a===curriculum[di].oppgaver[oi][2]) riktig[k]=true;
  render();
}

render();
</script>
</body>
</html>
